<div class="dashboard-container">
  <h1>Customer Dashboard</h1>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (customer of customers(); track customer.id) {
        <tr>
          <td>{{ customer.id }}</td>
          <td>{{ customer.name }}</td>
          <td>{{ customer.email }}</td>
          <td>{{ customer.status }}</td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4">No customers found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
