<div class="add-customer-form">
  <h3>Add New Customer</h3>
  <input [(ngModel)]="newCustomer.name" placeholder="Name" />
  <input [(ngModel)]="newCustomer.email" placeholder="Email" />
  <select [(ngModel)]="newCustomer.status">
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
  </select>
  <button (click)="addCustomer()">Add Customer</button>
</div>

<div class="dashboard-container">
  <h1>Customer Dashboard</h1>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (customer of customers(); track customer.id) {
      <tr>
        <td>{{ customer.id }}</td>
        
        @if (editingCustomerId === customer.id) {
          <td><input [(ngModel)]="editingCustomer.name" class="edit-input" /></td>
          <td><input [(ngModel)]="editingCustomer.email" class="edit-input" /></td>
          <td>
            <select [(ngModel)]="editingCustomer.status" class="edit-input">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </td>
          <td class="action-buttons">
            <button (click)="saveEdit()" class="apply-btn">Apply</button>
            <button (click)="cancelEdit()" class="cancel-btn">Cancel</button>
          </td>
        } 
        @else {
          <td>{{ customer.name }}</td>
          <td>{{ customer.email }}</td>
          <td>
            <span class="status-badge" [class.active]="customer.status === 'Active'">
              {{ customer.status }}
            </span>
          </td>
          <td class="action-buttons">
            <button (click)="startEdit(customer)" class="edit-btn">Edit</button>
            <button (click)="deleteCustomer(customer.id)" class="delete-btn">Delete</button>
          </td>
        }
      </tr>
      } @empty {
      <tr>
        <td colspan="5" style="text-align: center;">No customers found.</td>
      </tr>
      }
    </tbody>
  </table>
</div>
